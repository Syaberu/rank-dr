<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCsyaberu's Tier - DeathRun</title>
    <script src="data.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f12;
            --card-bg: #1c1c1e;
            --accent-cyan: #00d2ff;
            --tier-ht: #ff3b30;
            --tier-lt: #34c759;
            --tier-na: #3a3a3c;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
        }

        body {
            background-color: var(--bg-dark);
            color: #d1d1d6;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-main);
            font-size: 2.2rem;
            margin: 30px 0;
            letter-spacing: 4px;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        /* --- タブメニュー --- */
        .tabs {
            display: flex;
            border-bottom: 2px solid #2c2c2e;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 30px;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
        }
        .tabs::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            padding: 15px 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
        }

        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active {
            color: var(--accent-cyan);
            border-bottom: 3px solid var(--accent-cyan);
        }

        /* --- ランキングテーブル --- */
        .ranking-table {
            width: 100%;
            max-width: 1100px;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        .ranking-table thead th {
            padding: 10px 15px;
            text-align: left;
            color: #636366;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ranking-table tbody tr {
            background-color: var(--card-bg);
            transition: transform 0.2s, background-color 0.2s;
        }

        .ranking-table tbody tr:hover {
            transform: translateY(-3px);
            background-color: #252529;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .ranking-table td { padding: 15px; vertical-align: middle; }
        .ranking-table td:first-child { border-radius: 12px 0 0 12px; }
        .ranking-table td:last-child { border-radius: 0 12px 12px 0; }

        /* --- 順位カラー --- */
        .rank-col { width: 50px; text-align: center; font-size: 1.6rem; font-weight: 900; color: #444; }
        .rank-1 .rank-col { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .rank-2 .rank-col { color: #c0c0c0; }
        .rank-3 .rank-col { color: #cd7f32; }

        /* --- プレイヤー情報 --- */
        .skin-img {
            width: 54px;
            height: 54px;
            image-rendering: pixelated;
            border-radius: 8px;
            background: #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .player-name { font-size: 1.25rem; font-weight: 700; color: var(--text-main); display: block; margin-bottom: 2px; }
        .player-sub { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; }

        /* --- 64px 特大スタンプUI --- */
        .tier-stamp-container {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .tier-stamp {
            width: 64px;
            height: 64px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.1rem;
            transition: transform 0.2s;
            cursor: help;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .tier-stamp:hover { transform: scale(1.15); z-index: 10; }

        .stamp-map-label {
            font-size: 0.65rem;
            margin-bottom: 3px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .tier-ht { background: linear-gradient(135deg, #ff3b30, #ff2d55); color: #fff; }
        .tier-lt { background: linear-gradient(135deg, #34c759, #32d74b); color: #fff; }
        .tier-none { background: #3a3a3c; color: #777; }

        /* --- タイム & レーティング --- */
        .record-col { 
            text-align: right; 
            font-family: 'Consolas', 'Courier New', monospace; 
            color: var(--accent-cyan); 
            font-size: 1.4rem; 
            font-weight: 700;
            width: 180px;
        }
        .rating-col { text-align: right; color: var(--accent-cyan); font-weight: bold; width: 100px; }
        .rating-label { color: var(--text-sub); font-size: 0.65rem; display: block; margin-bottom: 2px; }

        /* アニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        tbody tr { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
    </style>
</head>
<body>

    <h1>DeathRun Leaderboard</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="updateMode('Overall', this)">OVERALL</button>
        <button class="tab-btn" onclick="updateMode('Cave', this)">CAVE</button>
        <button class="tab-btn" onclick="updateMode('Flora', this)">FLORA</button>
        <button class="tab-btn" onclick="updateMode('Gardens', this)">GARDENS</button>
        <button class="tab-btn" onclick="updateMode('Gardens(Spring)', this)">GARDENS(SPRING)</button>
    </div>

    <table class="ranking-table">
        <thead>
            <tr>
                <th style="text-align: center;">Rank</th>
                <th colspan="2">Player</th>
                <th style="text-align: center;">Map Status</th>
                <th style="text-align: right;">Total / Record</th>
                <th style="text-align: right;">Rating</th>
            </tr>
        </thead>
        <tbody id="ranking-body"></tbody>
    </table>

    <script>
        let currentMode = 'Overall';

        // マップの略称定義
        const mapShortNames = { 
            'Cave': 'C', 
            'Flora': 'F', 
            'Gardens': 'G', 
            'Gardens(Spring)': 'GS' 
        };

        // タイムフォーマット関数 (00:00.000)
        function formatTime(seconds) {
            if (seconds >= 900 || seconds <= 0) return "---";
            const mins = Math.floor(seconds / 60);
            const secs = (seconds % 60).toFixed(3);
            const displayMins = String(mins).padStart(2, '0');
            const displaySecs = String(secs).padStart(6, '0');
            return `${displayMins}:${displaySecs}`;
        }

        function updateMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function getTierIdx(tier) {
            if (!tier || tier === "-") return 999;
            const idx = TIER_ORDER.indexOf(tier);
            return idx === -1 ? 999 : idx;
        }

        // 有効なタイム（120秒や999秒を除外する場合はここを調整）
        function getValidSum(p) {
            return Object.values(p.mapTiers).reduce((acc, m) => acc + (m.record < 900 ? m.record : 0), 0);
        }

        function render() {
            const body = document.getElementById('ranking-body');
            body.innerHTML = '';
            let sorted = [...players];

            // ソート
            sorted.sort((a, b) => {
                if (currentMode === 'Overall') {
                    const sumA = getValidSum(a);
                    const sumB = getValidSum(b);
                    if (sumA === 0) return 1;
                    if (sumB === 0) return -1;
                    if (sumA !== sumB) return sumA - sumB;
                    return b.rating - a.rating;
                } else {
                    const mDataA = a.mapTiers[currentMode];
                    const mDataB = b.mapTiers[currentMode];
                    const idxA = getTierIdx(mDataA.tier);
                    const idxB = getTierIdx(mDataB.tier);
                    if (idxA !== idxB) return idxA - idxB;
                    if (mDataA.record !== mDataB.record) return mDataA.record - mDataB.record;
                    return b.rating - a.rating;
                }
            });

            sorted.forEach((p, i) => {
                const tr = document.createElement('tr');
                if (i < 3) tr.className = `rank-${i+1}`;
                tr.style.animationDelay = (i * 0.05) + 's';
                
                let tierContent = "";
                if (currentMode === 'Overall') {
                    tierContent = `<div class="tier-stamp-container">`;
                    for (const mapName of ['Cave', 'Flora', 'Gardens', 'Gardens(Spring)']) {
                        const data = p.mapTiers[mapName];
                        const tier = data.tier;
                        const cls = tier.startsWith("HT") ? "tier-ht" : (tier.startsWith("LT") ? "tier-lt" : "tier-none");
                        tierContent += `
                            <div class="tier-stamp ${cls}" title="${mapName}: ${tier}">
                                <span class="stamp-map-label">${mapShortNames[mapName]}</span>
                                <span>${tier === "-" ? "NA" : tier}</span>
                            </div>`;
                    }
                    tierContent += `</div>`;
                } else {
                    const mData = p.mapTiers[currentMode];
                    const cls = mData.tier.startsWith("HT") ? "tier-ht" : (mData.tier.startsWith("LT") ? "tier-lt" : "tier-none");
                    tierContent = `<div style="display:flex; justify-content:center;"><div class="tier-stamp ${cls}" style="width:110px;">${mData.tier}</div></div>`;
                }

                const total = getValidSum(p);
                const rawRecord = currentMode === 'Overall' ? total : p.mapTiers[currentMode].record;
                const recDisp = formatTime(rawRecord);

                tr.innerHTML = `
                    <td class="rank-col">${i + 1}</td>
                    <td style="width: 70px;"><img src="skins/${p.name}.png" class="skin-img" onerror="this.src='skins/default.png'"></td>
                    <td>
                        <span class="player-name">${p.name}</span>
                        <span class="player-sub">WINS: ${p.wins} / MATCHES: ${p.matches}</span>
                    </td>
                    <td>${tierContent}</td>
                    <td class="record-col">${recDisp}</td>
                    <td class="rating-col">
                        <span class="rating-label">RATING</span>
                        ${p.rating}
                    </td>
                `;
                body.appendChild(tr);
            });
        }
        window.onload = render;
    </script>
</body>
</html>
